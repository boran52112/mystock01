name: Daily Stock Scanner

# 觸發時間：1.每天台灣時間下午 5 點跑 (UTC 9:00) 2.當你按儲存時也跑一次測試
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: # 讓我們可以在後台手動按「開始」

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予機器人把資料寫回來的權利

    steps:
    - name: 1. 下載你的程式碼
      uses: actions/checkout@v3

    - name: 2. 安裝 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 安裝工具清單 (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 執行掃描程式 (scanner.py)
      env:
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }} # 從保險箱拿 Key
      run: python scanner.py

    - name: 5. 把產出的 CSV 存回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "自動更新每日掃描資料" || echo "今天資料沒變動"
        git push

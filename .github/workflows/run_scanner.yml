name: 每日台股資料備份至試算表

on:
  # 每天台灣時間 17:00 自動執行 (UTC 09:00)
  schedule:
    - cron: '0 9 * * *'
  # 允許手動點擊 Run workflow 執行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 下載你的程式碼
        uses: actions/checkout@v3

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 3. 安裝工具清單 (requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 執行掃描程式 (scanner.py)
        # 這裡是最關鍵的：把保險箱裡的秘密交給程式
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scanner.py

      - name: 5. 提交變動 (確保 Repo 活躍)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || git commit -m "自動更新每日掃描資料"
          git push || echo "沒有變動可以提交"
